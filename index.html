<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta charset="UTF-8" />
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=0.8, minimum-scale=0.8, maximum-scale=0.8, user-scalable=no, viewport-fit=cover"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>General | Blog</title>
    <link rel="icon" type="image/png" href="" />
    <link rel="stylesheet" href="font.css" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <!-- ═══════════════════════════════════════════════
         MOBILE LAYOUT — Header / Main / Footer shell
         ═══════════════════════════════════════════════ -->
    <div class="mobile-layout">
      <!-- ── HEADER ── -->
      <header class="header"></header>

      <!-- ── MAIN ── Page content injected here by appindex.js -->
      <main class="main" id="main">
        <!-- appindex.js will populate this area with page content -->
      </main>

      <!-- ── FOOTER NAV ── -->
      <footer class="footer">
        <div class="footer-wrapper">
          <div class="home-blog-footer">
            <div class="blog-footer-wrapper">
              <div class="blog-footer-board">
                <img
                  class="blog-footer-icon"
                  src="https://i.postimg.cc/BvPWtCCR/blog-join-community-icon.png"
                />
                <div class="blog-footer-text">
                  <div class="blog-footer-title">Join Community</div>
                  <div class="blog-footer-tagline">
                    subscribe to weekly newsletter
                  </div>
                </div>
              </div>
              <img
                class="blog-toggle-icon"
                src="https://i.postimg.cc/KvWJ4hsb/blog-toggle-icon.png"
              />
            </div>
          </div>
        </div>
      </footer>
    </div>

    <!-- ══════════════════════════════════════════════
         REDIRECT — shown on Tablet & Desktop
         (index.css hides .mobile-layout above 768px
         and shows this instead)
         ══════════════════════════════════════════════ -->
    <div class="redirect-page">
      <div class="redirect-container">
        <h1 class="redirect-title">504 Error</h1>
        <img
          src="https://i.postimg.cc/XvnXLWQv/redirect-img.png"
          alt="Mobile only"
          class="redirect-img"
        />
        <div class="redirect-text">
          <p class="redirect-subtext">
            This is Currently Unavailable on Tablet and Desktop
          </p>
          <a href="#" class="redirect-cta">View On Mobile</a>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════
         SCRIPTS — Router + Core functionality
         ═══════════════════════════════════════════════════════════ -->
    <script defer src="appindex.js"></script>
    <script defer src="js/index.js"></script>
  </body>
</html>
